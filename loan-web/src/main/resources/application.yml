spring:
  data:
    redis:
      host: localhost
      port: 6379
      password:      # 如果你没在 docker 里设置密码，这里留空
      lettuce:
        pool:
          max-active: 8  # 最大连接数
          max-idle: 8    # 最大空闲连接
          min-idle: 0

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 开发环境建议开启，看 SQL 运行情况
    map-underscore-to-camel-case: true # 自动下划线转驼峰
  global-config:
    db-config:
      id-type: auto # 主键自增策略